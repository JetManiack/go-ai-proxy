# go-ai-proxy example configuration
# Copy to config.yaml and adjust for your setup.
# Secrets: use ${ENV_VAR} syntax — the proxy expands environment variables at startup.

server:
  host: "127.0.0.1"
  port: 8090
  refresh_interval: 1h       # how often to re-fetch model lists from all providers
  # shutdown_timeout: 30s
  # max_request_body_bytes: 10485760   # 10 MiB
  # audit_log: true           # log every request/response (prompts at debug level)
  # metrics: true             # expose Prometheus metrics at GET /metrics
  # rate_limit:
  #   rps: 10
  #   burst: 20
  #   per_caller: false       # true = separate bucket per Authorization header

providers:
  # ── Local LM Studio ──────────────────────────────────────────────────────────
  - name: lmstudio
    type: openai
    base_url: "http://localhost:1234"
    max_concurrent: 4         # match your GPU capacity
    queue_size: 8
    # request_timeout: 20s   # fail over to next provider if no first token in 20s
    # tls:
    #   insecure: true       # skip TLS verification — only for self-hosted HTTPS with self-signed certs
    # model_capabilities:    # LM Studio doesn't report capabilities — declare manually
    #   "llama-3.2-vision": ["vision"]
    #   "qwq-32b": ["reasoning"]
    #   "deepseek-r1": ["reasoning"]

  # ── LiteLLM (auto-discovers capabilities via /model/info) ────────────────────
  # - name: litellm
  #   type: litellm
  #   base_url: "https://litellm.example.com"
  #   auth:
  #     method: api_key
  #     api_key: "${LITELLM_API_KEY}"

  # ── Ollama ───────────────────────────────────────────────────────────────────
  # - name: ollama
  #   type: openai
  #   base_url: "http://localhost:11434"

  # ── OpenAI ───────────────────────────────────────────────────────────────────
  # - name: openai
  #   type: openai
  #   base_url: "https://api.openai.com"
  #   auth:
  #     method: api_key
  #     api_key: "${OPENAI_API_KEY}"

  # ── vLLM (e.g. gemma-4-31b-it on a self-hosted server) ─────────────────────
  # OpenAI-compatible, but with two upstream quirks the proxy handles:
  #   - reasoning content arrives in a `reasoning` field (the translator now
  #     reads it as a synonym for reasoning_content)
  #   - thinking mode is toggled via chat_template_kwargs.<key>; the provider
  #     injects this on each request based on the client's `reasoning_effort`.
  # vLLM /v1/models does NOT report capability info, so model_capabilities is
  # REQUIRED — the provider refuses to start without explicit entries for
  # every model it intends to serve.
  # - name: vllm-local
  #   type: vllm
  #   base_url: "https://vllm.local"
  #   request_timeout: 5m       # decode is ~3 tok/s; default for vllm should be generous
  #   vllm:
  #     thinking_key: "enable_thinking"   # default; use "thinking" for Granite / DeepSeek-V3.1
  #     # discover: true                  # default; call upstream /v1/models
  #     # models: ["gemma-4-31b-it"]      # fallback list when discover is off or upstream 5xx
  #   # tls:
  #   #   insecure: true                  # use only with self-signed certs you control
  #   # REQUIRED — vllm /v1/models has no capability info; declare what each model supports:
  #   model_capabilities:
  #     "gemma-4-31b-it": ["vision", "reasoning", "tools"]

  # ── llama.cpp (e.g. gemma-3-27b-it on a self-hosted server) ─────────────────
  # OpenAI-compatible, but llama.cpp's response_format/json_schema path crashes
  # the Gemma-3 sampler — only its native `grammar` (GBNF) field works reliably.
  # The provider converts a client's OpenAI response_format json_schema into a
  # GBNF grammar transparently; a client may also send `grammar` directly to
  # bypass the converter (escape hatch for schemas the converter can't handle).
  # llama.cpp /v1/models does NOT report capability info, so model_capabilities
  # is REQUIRED — the provider refuses to start without explicit entries for
  # every model it intends to serve.
  # - name: llamacpp
  #   type: llama-cpp                 # converts response_format json_schema -> GBNF grammar
  #   base_url: "http://llama.local:8080"
  #   # tls:
  #   #   insecure: true              # use only with self-signed certs you control
  #   model_capabilities:
  #     "gemma-3-27b-it": ["structured_output"]

  # ── Anthropic ────────────────────────────────────────────────────────────────
  # - name: anthropic
  #   type: anthropic
  #   auth:
  #     method: api_key
  #     api_key: "${ANTHROPIC_API_KEY}"
  #     # method: oauth
  #     # token_file: "~/.config/go-ai-proxy/anthropic.json"
  #   token_budget:
  #     models:
  #       claude-opus-4-7: 4096

  # ── Local + cloud fallback ───────────────────────────────────────────────────
  # This pattern runs local first and falls back to Anthropic when the GPU is
  # busy or slow to respond.
  #
  # - name: lmstudio
  #   type: openai
  #   base_url: "http://localhost:1234"
  #   max_concurrent: 2
  #   queue_size: 6
  #   request_timeout: 20s
  #
  # - name: anthropic
  #   type: anthropic
  #   auth:
  #     method: api_key
